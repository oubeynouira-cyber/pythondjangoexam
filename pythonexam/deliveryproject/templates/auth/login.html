{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --secondary-color: #2c3e50;
        }

        body {
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--secondary-color), #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .card-header-custom {
            background: linear-gradient(135deg, var(--secondary-color), #34495e);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .card-body {
            background: white;
            padding: 30px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 25px;
        }

        .signup-link {
            text-align: center;
            margin-top: 15px;
        }

        .signup-link a {
            text-decoration: none;
            font-weight: 500;
        }
        .back-arrow {
    position: absolute;
    left: 15px;
    color: white;
    font-size: 1.4rem;
    text-decoration: none;
    transition: 0.3s;
}

.back-arrow:hover {
    transform: translateX(-3px);
    color: #dcdcdc;
}
    </style>
</head>

<body>

<div class="login-card">

   <div class="card-header-custom d-flex align-items-center justify-content-center position-relative">
    
    <!-- Back Arrow -->
    <a href="{% url 'delivery_homepage' %}" class="back-arrow">
        <i class="bi bi-arrow-left"></i>
    </a>

    <!-- Title -->
    <span>Create Account</span> <!-- change to "Welcome Back" in login -->

</div>

    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Email</label>
                <input type="text" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 btn-custom">
                Login
            </button>
        </form>

        <div class="signup-link">
            Don't have an account?
            <a href="{% url 'signup' %}">Sign up</a>
        </div>

    </div>

</div>

</body>
</html>
