{% extends "layouts/base.html" %}

{% block title %}Ajouter Client{% endblock %}

{% block content %}

<h2>Ajouter un client</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Enregistrer
    </button>

    <a href="{% url 'client_list' %}" class="btn btn-secondary">
        Retour
    </a>
</form>

{% endblock %}
