{% extends "layouts/base.html" %}

{% block title %}Modifier Livraison{% endblock %}

{% block content %}

<h2>Modifier une livraison</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Mettre à jour
    </button>

    <a href="{% url 'delivery_list' %}" class="btn btn-secondary">
        Retour
    </a>
</form>

{% endblock %}
